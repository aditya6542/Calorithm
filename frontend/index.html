<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI-powered diet meal planner — personalized nutrition plans generated by artificial intelligence.">
  <title>Calorithm — Smart Diet Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="logo">
          <div class="logo-icon-wrapper">
            <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="var(--accent)" />
                  <stop offset="100%" stop-color="var(--accent-2)" />
                </linearGradient>
                <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00D68F" />
                  <stop offset="100%" stop-color="#00A36C" />
                </linearGradient>
                <linearGradient id="flameGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#7C5CFC" />
                  <stop offset="100%" stop-color="#FF6B35" />
                </linearGradient>
              </defs>
              <circle class="orbit-ring" cx="16" cy="16" r="14" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="60 20" />
              <path class="leaf-lobe" d="M16 6C11 11 9 17 11 22C13 25 16 26 16 26" stroke="url(#leafGrad)" stroke-width="2.5" stroke-linecap="round" />
              <path class="energy-lobe" d="M16 6C21 11 23 17 21 22C19 25 16 26 16 26" stroke="url(#flameGrad)" stroke-width="2.5" stroke-linecap="round" />
              <path d="M16 11V21" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" />
              <circle class="center-node" cx="16" cy="16" r="3.5" fill="url(#logoGrad)" />
              <circle cx="16" cy="16" r="1.5" fill="#ffffff" />
            </svg>
          </div>
          <span class="logo-text">Calo<span class="logo-text-highlight">rithm</span></span>
        </a>
        <p>Your AI-powered personal nutritionist</p>
      </div>
      <div class="auth-card">
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
          <div class="form-group checkbox-group" style="display:flex;align-items:center;gap:8px;margin-bottom:18px;">
            <input type="checkbox" id="rememberMe" style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent);" checked>
            <label for="rememberMe" style="color:var(--text-secondary);font-size:0.85rem;cursor:pointer;user-select:none;margin-bottom:0;">Remember me on this device</label>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        <div class="demo-login-box" style="margin-top:20px;padding:16px;border:1px dashed var(--border-glass);border-radius:var(--radius-sm);background:rgba(255,255,255,0.02);text-align:center;">
          <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:10px;">Want to test with a pre-configured profile?</p>
          <button id="quickDemoBtn" class="btn btn-secondary btn-block" style="font-size:0.85rem;padding:8px 14px;">⚡ Quick Demo Login</button>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:8px;">
            demo@calorithm.com / demo1234
          </div>
        </div>
        <p class="text-center mt-2" style="color:var(--text-secondary);font-size:0.9rem;">
          Don't have an account? <a href="register.html">Create one</a>
        </p>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
