<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Calorithm account to get personalized AI-generated meal plans.">
  <title>Register — Calorithm</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="logo">
          <div class="logo-icon-wrapper">
            <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="var(--accent)" />
                  <stop offset="100%" stop-color="var(--accent-2)" />
                </linearGradient>
                <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00D68F" />
                  <stop offset="100%" stop-color="#00A36C" />
                </linearGradient>
                <linearGradient id="flameGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#7C5CFC" />
                  <stop offset="100%" stop-color="#FF6B35" />
                </linearGradient>
              </defs>
              <circle class="orbit-ring" cx="16" cy="16" r="14" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="60 20" />
              <path class="leaf-lobe" d="M16 6C11 11 9 17 11 22C13 25 16 26 16 26" stroke="url(#leafGrad)" stroke-width="2.5" stroke-linecap="round" />
              <path class="energy-lobe" d="M16 6C21 11 23 17 21 22C19 25 16 26 16 26" stroke="url(#flameGrad)" stroke-width="2.5" stroke-linecap="round" />
              <path d="M16 11V21" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" />
              <circle class="center-node" cx="16" cy="16" r="3.5" fill="url(#logoGrad)" />
              <circle cx="16" cy="16" r="1.5" fill="#ffffff" />
            </svg>
          </div>
          <span class="logo-text">Calo<span class="logo-text-highlight">rithm</span></span>
        </a>
        <p>Create your account to get started</p>
      </div>
      <div class="auth-card">
        <form id="registerForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>
        <p class="text-center mt-2" style="color:var(--text-secondary);font-size:0.9rem;">
          Already have an account? <a href="index.html">Sign in</a>
        </p>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
